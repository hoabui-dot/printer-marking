name: mes-platform

services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mes-postgres
    restart: unless-stopped
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-mes}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mes_S3cur3_Pass!2025}
      POSTGRES_DB: ${DB_NAME:-mes_platform}
    volumes:
      - mes-postgres-data:/var/lib/postgresql/data
    networks:
      - mes-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mes} -d ${DB_NAME:-mes_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: mes-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-mes_R3dis_Pass!2025}"
    ports:
      - "6381:6379"
    volumes:
      - mes-redis-data:/data
    networks:
      - mes-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mes_R3dis_Pass!2025}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: mes-rabbitmq
    restart: unless-stopped
    ports:
      - "5674:5672"
      - "15674:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-mes}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-mes_Rabb1t_Pass!2025}
    volumes:
      - mes-rabbitmq-data:/var/lib/rabbitmq
    networks:
      - mes-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # MES Migration Runner
  # ─────────────────────────────────────────────
  migrate:
    image: migrate/migrate:v4.18.1
    container_name: mes-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://${DB_USER:-mes}:${DB_PASSWORD:-mes_S3cur3_Pass!2025}@postgres:5432/${DB_NAME:-mes_platform}?sslmode=disable
      - up
    networks:
      - mes-net
    restart: on-failure

  # ─────────────────────────────────────────────
  # MES Platform Backend (Go)
  # ─────────────────────────────────────────────
  mes:
    image: vanhoadotbui2628/mes-platform:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mes-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: ${APP_PORT:-8080}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-mes}
      DB_PASSWORD: ${DB_PASSWORD:-mes_S3cur3_Pass!2025}
      DB_NAME: ${DB_NAME:-mes_platform}
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME_MINUTES: ${DB_CONN_MAX_LIFETIME_MINUTES:-60}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mes_R3dis_Pass!2025}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-10}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-mes}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-mes_Rabb1t_Pass!2025}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-mes.events}
      JWT_SECRET: ${JWT_SECRET:-mes_JWT_S3cr3t_K3y_M3sPlat4orm_2025_VeryLongSecretKeyAt64CharactersAtLeast!}
      JWT_ACCESS_EXPIRY_MINUTES: ${JWT_ACCESS_EXPIRY_MINUTES:-15}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-30}
      JWT_ISSUER: ${JWT_ISSUER:-mes-platform}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-mes-users}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3100,http://localhost:5173,http://localhost:80,http://mes-frontend:80}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_PATH: ${METRICS_PATH:-/metrics}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OUTBOX_POLL_INTERVAL_SECONDS: ${OUTBOX_POLL_INTERVAL_SECONDS:-5}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-100}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-100}
      RATE_LIMIT_AUTH_REQUESTS_PER_MINUTE: ${RATE_LIMIT_AUTH_REQUESTS_PER_MINUTE:-20}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-8}
      PASSWORD_REQUIRE_UPPERCASE: ${PASSWORD_REQUIRE_UPPERCASE:-true}
      PASSWORD_REQUIRE_LOWERCASE: ${PASSWORD_REQUIRE_LOWERCASE:-true}
      PASSWORD_REQUIRE_NUMBER: ${PASSWORD_REQUIRE_NUMBER:-true}
      PASSWORD_REQUIRE_SPECIAL: ${PASSWORD_REQUIRE_SPECIAL:-false}
      PASSWORD_RESET_TOKEN_EXPIRY_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRY_MINUTES:-30}
    volumes:
      - mes-logs:/app/logs
    networks:
      - mes-net
    healthcheck:
      # scratch-based image has no wget/curl — use TCP check via /proc
      # The app health is verified externally; mark as disable to avoid false unhealthy
      disable: true

  # ─────────────────────────────────────────────
  # MES Frontend (React / Nginx)
  # ─────────────────────────────────────────────
  mes-frontend:
    image: vanhoadotbui2628/mes-frontend:latest
    build:
      context: ../mes-frontend
      dockerfile: Dockerfile
    container_name: mes-frontend
    restart: unless-stopped
    depends_on:
      mes:
        condition: service_started
    ports:
      - "3100:80"
    environment:
      NGINX_BACKEND_URL: http://mes:8080
    volumes:
      - ../mes-frontend/dist:/usr/share/nginx/html:ro
    networks:
      - mes-net
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  mes-postgres-data:
  mes-redis-data:
  mes-rabbitmq-data:
  mes-logs:

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  mes-net:
    driver: bridge
    name: mes-net
