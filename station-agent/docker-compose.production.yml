version: '3.8'

name: station-agent-production

services:
  # ─────────────────────────────────────────────
  # Infrastructure Services
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: production-station-redis
    restart: always
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - station-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: production-station-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - station-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # 1. Station Gateway Service (HTTP Gateway)
  # ─────────────────────────────────────────────
  station-gateway:
    image: ${DOCKER_REGISTRY:-vanhoadotbui2628}/station-gateway:${VERSION:-latest}
    container_name: production-station-gateway
    restart: always
    ports:
      - "${PORT_STATION_GATEWAY:-5001}:5001"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_HTTP_PORTS=5001
      - ASPNETCORE_ENVIRONMENT=Production
      - STATION_ID=${STATION_ID}
      - REDIS_CONNECTION_STRING=redis:6379,password=${REDIS_PASSWORD}
      - SQLITE_GATEWAY_PATH=${SQLITE_GATEWAY_PATH:-/data/gateway.db}
      - Gateway__OutboxBatchSize=10
      - Gateway__OutboxIntervalSeconds=5
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=${RABBITMQ_USER}
      - RabbitMq__Password=${RABBITMQ_PASS}
      - RabbitMq__VirtualHost=/
      - RabbitMq__DefaultExchange=station.events
    volumes:
      - sqlite-data:/data
      - mqtt-logs:/logs
    networks:
      - station-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # 2. Job Engine Service
  # ─────────────────────────────────────────────
  job-engine:
    image: ${DOCKER_REGISTRY:-vanhoadotbui2628}/job-engine:${VERSION:-latest}
    container_name: production-station-job-engine
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5002:5002"
    environment:
      - STATION_ID=${STATION_ID}
      - REDIS_CONNECTION_STRING=redis:6379,password=${REDIS_PASSWORD}
      - SQLITE_JOB_ENGINE_PATH=/data/job_engine.db
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=${RABBITMQ_USER}
      - RabbitMq__Password=${RABBITMQ_PASS}
      - RabbitMq__VirtualHost=/
      - RabbitMq__DefaultExchange=station.events
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - sqlite-data:/data
      - job-engine-logs:/logs
    networks:
      - station-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # 3. Printer Adapter Service
  # ─────────────────────────────────────────────
  printer-adapter:
    image: ${DOCKER_REGISTRY:-vanhoadotbui2628}/printer-adapter:${VERSION:-latest}
    container_name: production-station-printer-adapter
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5003:5003"
    environment:
      - STATION_ID=${STATION_ID}
      - REDIS_CONNECTION_STRING=redis:6379,password=${REDIS_PASSWORD}
      - SQLITE_PRINTER_PATH=/data/printer.db
      - ASPNETCORE_ENVIRONMENT=Production
      - Printer__Host=${PRODUCTION_PRINTER_IP}
      - Printer__Port=${PRODUCTION_PRINTER_PORT:-9100}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=${RABBITMQ_USER}
      - RabbitMq__Password=${RABBITMQ_PASS}
      - RabbitMq__VirtualHost=/
      - RabbitMq__DefaultExchange=station.events
    volumes:
      - sqlite-data:/data
      - printer-logs:/logs
    networks:
      - station-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # 4. Laser Adapter Service
  # ─────────────────────────────────────────────
  laser-adapter:
    image: ${DOCKER_REGISTRY:-vanhoadotbui2628}/laser-adapter:${VERSION:-latest}
    container_name: production-station-laser-adapter
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5004:5004"
    environment:
      - STATION_ID=${STATION_ID}
      - REDIS_CONNECTION_STRING=redis:6379,password=${REDIS_PASSWORD}
      - SQLITE_LASER_PATH=/data/laser.db
      - Laser__Host=${PRODUCTION_LASER_IP}
      - Laser__Port=${PRODUCTION_LASER_PORT:-8901}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=${RABBITMQ_USER}
      - RabbitMq__Password=${RABBITMQ_PASS}
      - RabbitMq__VirtualHost=/
      - RabbitMq__DefaultExchange=station.events
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - sqlite-data:/data
      - laser-logs:/logs
    networks:
      - station-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # 5. Vision Service
  # ─────────────────────────────────────────────
  vision-service:
    image: ${DOCKER_REGISTRY:-vanhoadotbui2628}/vision-service:${VERSION:-latest}
    container_name: production-station-vision-service
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5005:5005"
    environment:
      - STATION_ID=${STATION_ID}
      - REDIS_CONNECTION_STRING=redis:6379,password=${REDIS_PASSWORD}
      - SQLITE_VISION_PATH=/data/vision.db
      - VISION_IMAGE_STORAGE_PATH=/storage/vision
      - VisionCamera__Host=${PRODUCTION_CAMERA_IP}
      - VisionCamera__Port=${PRODUCTION_CAMERA_PORT:-80}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=${RABBITMQ_USER}
      - RabbitMq__Password=${RABBITMQ_PASS}
      - RabbitMq__VirtualHost=/
      - RabbitMq__DefaultExchange=station.events
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - sqlite-data:/data
      - vision-logs:/logs
      - vision-storage:/storage
    networks:
      - station-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # 6. PLC Adapter Service
  # ─────────────────────────────────────────────
  plc-adapter:
    image: ${DOCKER_REGISTRY:-vanhoadotbui2628}/plc-adapter:${VERSION:-latest}
    container_name: production-station-plc-adapter
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5006:5006"
    environment:
      - STATION_ID=${STATION_ID}
      - REDIS_CONNECTION_STRING=redis:6379,password=${REDIS_PASSWORD}
      - SQLITE_PLC_PATH=/data/plc.db
      - Plc__Host=${PRODUCTION_PLC_IP}
      - Plc__Port=${PRODUCTION_PLC_PORT:-502}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=${RABBITMQ_USER}
      - RabbitMq__Password=${RABBITMQ_PASS}
      - RabbitMq__VirtualHost=/
      - RabbitMq__DefaultExchange=station.events
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - sqlite-data:/data
      - plc-logs:/logs
    networks:
      - station-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # 7. Kiosk UI Service
  # ─────────────────────────────────────────────
  kiosk-ui:
    image: ${DOCKER_REGISTRY:-vanhoadotbui2628}/kiosk-ui:${VERSION:-latest}
    container_name: production-station-kiosk-ui
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5222:5007"
    environment:
      - STATION_ID=${STATION_ID}
      - REDIS_CONNECTION_STRING=redis:6379,password=${REDIS_PASSWORD}
      - SQLITE_KIOSK_PATH=/data/kiosk.db
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER:-nd-station-agent}
      - Jwt__Audience=${JWT_AUDIENCE:-nd-kiosk}
      - Jwt__ExpiryMinutes=${JWT_EXPIRY_MINUTES:-480}
      - ASPNETCORE_ENVIRONMENT=Production
      - JOB_ENGINE_HOST=${JOB_ENGINE_HOST}
      - JOB_ENGINE_PORT=${JOB_ENGINE_PORT}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - sqlite-data:/data
      - kiosk-logs:/logs
    networks:
      - station-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # 8. Projection Service
  # ─────────────────────────────────────────────
  projection-service:
    image: ${DOCKER_REGISTRY:-vanhoadotbui2628}/projection-service:${VERSION:-latest}
    container_name: production-station-projection-service
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "5009:5009"
    environment:
      - STATION_ID=${STATION_ID}
      - SQLITE_PROJECTION_PATH=/data/projection.db
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=${RABBITMQ_USER}
      - RabbitMq__Password=${RABBITMQ_PASS}
      - RabbitMq__VirtualHost=/
      - RabbitMq__DefaultExchange=station.events
      - ASPNETCORE_ENVIRONMENT=Production
      - SIMULATOR_URL=${SIMULATOR_URL:-http://device-simulator:8080}
    volumes:
      - sqlite-data:/data
      - projection-logs:/logs
    networks:
      - station-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5009/health"]
      interval: 15s
      timeout: 5s
      retries: 3

# ─────────────────────────────────────────────
# Volumes Configuration (Production Mounts)
# ─────────────────────────────────────────────
volumes:
  redis-data:
  rabbitmq-data:
  sqlite-data:
  mqtt-logs:
  job-engine-logs:
  printer-logs:
  laser-logs:
  vision-logs:
  vision-storage:
  plc-logs:
  kiosk-logs:
  projection-logs:

# ─────────────────────────────────────────────
# Networks Configuration
# ─────────────────────────────────────────────
networks:
  station-net:
    driver: bridge
    name: station-net-production
